<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debisi Thrift and Glow - Product Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overlay">
    <div class="product-card">
      <img src="file_000000002e6472308d50fb0319428696.png" alt="Luxury Dress" class="product-image">
      <div class="product-info">
        <h3 class="product-name">Luxury Satin Dress</h3>
        <p class="product-description">Elegant, soft-touch fabric with a bold feminine glow.</p>
        <div class="product-price">₦12,000</div>
        <button class="buy-btn">Add to Cart</button>
      </div>
    </div>
  </div>
</body>
</html>
