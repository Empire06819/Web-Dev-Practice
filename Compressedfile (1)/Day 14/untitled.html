<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pure HTML & CSS Photo Gallery</title>
<style>
  :root{
    --bg: #0b1220;
    --card: #071226;
    --muted: #9aa6b2;
    --accent: #3b82f6;
    --gap: 14px;
    --radius: 10px;
  }

  /* Reset & base */
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background: brown;
    color:#e6eef6;
    padding:28px;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{
    max-width:1200px;
    margin:0 auto;
  }

  h1{
    margin:0 0 10px 0;
    font-size:20px;
    letter-spacing:-0.2px;
  }

  p.lead{
    margin:0 0 20px 0;
    color:var(--muted);
    font-size:14px;
  }

  /* Gallery grid */
  .gallery{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:var(--gap);
  }

  /* Card */
  .card{
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    border-radius:var(--radius);
    overflow:hidden;
    position:relative;
    box-shadow:0 8px 30px rgba(2,6,23,0.6);
    transition:transform .22s ease, box-shadow .22s ease;
  }
  .card:focus-within,
  .card:hover{
    transform: translateY(-6px);
    box-shadow:0 16px 40px rgba(2,6,23,0.75);
  }

  /* Thumbnail */
  .thumb{
    display:block;
    width:100%;
    height:0;
    padding-bottom:66.66%; /* 3:2 aspect ratio */
    position:relative;
    overflow:hidden;
    text-decoration:none;
  }
  .thumb img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform .4s ease;
  }
  .card:hover img,
  .card:focus-within img{
    transform: scale(1.06);
  }

  /* Caption */
  .caption{
    padding:10px 12px;
    font-size:13px;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .caption small{font-size:12px;color:#bcd0ff}

  /* LIGHTBOX using :target */
  .lightbox{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(2,6,23,0.85);
    padding:28px;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
    z-index:1200;
  }
  .lightbox:target{
    opacity:1;
    pointer-events:auto;
  }

  .lightbox .inner{
    max-width:1100px;
    width:100%;
    border-radius:10px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    padding:12px;
    display:flex;
    gap:12px;
    align-items:center;
  }

  .lightbox img{
    width:100%;
    height:calc(70vh);
    object-fit:contain;
    display:block;
    border-radius:6px;
    background:#071226;
  }

  /* close button */
  .close{
    position:absolute;
    top:18px;
    right:18px;
    background:transparent;
    color:#e6eef6;
    text-decoration:none;
    font-weight:700;
    font-size:22px;
    border:0;
    padding:8px 12px;
    border-radius:8px;
    transition:background .12s ease;
  }
  .close:hover, .close:focus{
    background:rgba(255,255,255,0.04);
    outline: none;
  }

  /* small-screen responsiveness */
  @media (max-width:1000px){
    .gallery{ grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width:700px){
    .gallery{ grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width:420px){
    .gallery{ grid-template-columns: 1fr; }
    .lightbox img{ height:60vh; }
  }

  /* Accessibility focus visible */
  a:focus{
    outline: 3px solid rgba(59,130,246,0.18);
    outline-offset:3px;
  }

</style>
</head>
<body>
  <div class="wrap" role="main">
    <h1>Photo Gallery</h1>
    <p class="lead">Tap a photo to open it.</p>

    <div class="gallery" aria-label="Photo gallery">

      <!-- Item 1 -->
      <article class="card">
        <a class="thumb" href="#img1" aria-labelledby="c1">
          <img src="IMG-20250320-WA0001.jpg" alt="Sunset over lake" loading="lazy">
        </a>
        <div class="caption">
          <span id="c1">Comrade Yoo</span>
          <small>3:2 • JPG</small>
        </div>
      </article>

      <!-- Item 2 -->
      <article class="card">
        <a class="thumb" href="#img2" aria-labelledby="c2">
          <img src="IMG-20251006-WA0040.jpg" alt="City skyline at night" loading="lazy">
        </a>
        <div class="caption">
          <span id="c2">Dee Beauty</span>
          <small>3:2 • JPG</small>
        </div>
      </article>

      <!-- Item 3 -->
      <article class="card">
        <a class="thumb" href="#img3" aria-labelledby="c3">
          <img src="IMG-20250319-WA0013.jpg" alt="Forest path" loading="lazy">
        </a>
        <div class="caption">
          <span id="c3">Another Comrade</span>
          <small>3:2 • JPG</small>
        </div>
      </article>

      <!-- Item 4 -->
      <article class="card">
        <a class="thumb" href="#img4" aria-labelledby="c4">
          <img src="IMG-20251007-WA0154.jpg" alt="Minimal desk setup" loading="lazy">
        </a>
        <div class="caption">
          <span id="c4">Casamigos</span>
          <small>3:2 • JPG</small>
        </div>
      </article>


    </div>
  </div>

  <!-- LIGHTBOX PANELS -->
  <div id="img1" class="lightbox" aria-hidden="false">
    <a class="close" href="#" title="Close (Esc)">✕</a>
    <div class="inner" role="dialog" aria-label="Sunset over lake photo">
      <img src="IMG-20250320-WA0001.jpg" alt="Sunset over lake — full size">
    </div>
  </div>

  <div id="img2" class="lightbox">
    <a class="close" href="#" title="Close (Esc)">✕</a>
    <div class="inner" role="dialog" aria-label="City skyline photo">
      <img src="IMG-20251006-WA0040.jpg" alt="City skyline — full size">
    </div>
  </div>

  <div id="img3" class="lightbox">
    <a class="close" href="#" title="Close (Esc)">✕</a>
    <div class="inner" role="dialog" aria-label="Forest path photo">
      <img src="IMG-20250319-WA0013.jpg" alt="Forest path — full size">
    </div>
  </div>

  <div id="img4" class="lightbox">
    <a class="close" href="#" title="Close (Esc)">✕</a>
    <div class="inner" role="dialog" aria-label="Desk setup photo">
      <img src="IMG-20251007-WA0154.jpg" alt="Desk setup — full size">
    </div>
  </div>

</body>
</html>
