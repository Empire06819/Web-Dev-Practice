<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donate | Support Our Mission</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif;}

    body{
      background:linear-gradient(135deg,#4b6cb7,#182848);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .donation-container{
      background:rgba(255,255,255,0.1);
      padding:30px;
      border-radius:16px;
      width:100%;
      max-width:400px;
      text-align:center;
      box-shadow:0 8px 20px rgba(0,0,0,0.3);
    }

    h2{
      margin-bottom:10px;
      font-size:1.6rem;
    }

    p{
      color:#dbe2ef;
      margin-bottom:20px;
      font-size:0.95rem;
    }

    input, select, button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      margin-bottom:15px;
      font-size:1rem;
    }

    input, select{
      background:#f0f0f0;
      color:#333;
    }

    button{
      background:#ffd43b;
      color:#000;
      font-weight:600;
      cursor:pointer;
      transition:background 0.3s;
    }

    button:hover{
      background:#ffc107;
    }

    .footer{
      font-size:0.85rem;
      color:#ccc;
      margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="donation-container">
    <h2>Make a Donation #10klaptopsproject</h2>
    
    <p>Your support would help me get a new Laptop.</p>

    <form>
      <input type="text" placeholder="Full Name" required />
      <input type="email" placeholder="Email Address" required />
      <select required>
        <option value="">Select Amount</option>
        <option>&#8358;500</option>
        <option>&#8358;1000</option>
        <option>&#8358;2000</option>
        <option>&#8358;3000</option>
        <option>&#8358;5000</option>
      </select>
      <button type="submit">Donate Now</button>
    </form>

    <div class="footer">
       Thank you for your generosity!
    </div>
  </div>
</body>
</html>
